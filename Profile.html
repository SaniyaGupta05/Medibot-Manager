<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Update</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            margin: auto;
        }
        .back-btn {
            text-align: left;
            margin-bottom: 10px;
        }
        .back-btn i {
            font-size: 18px;
            cursor: pointer;
            color: #555;
        }
        .profile-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .profile-pic {
            position: relative;
            display: inline-block;
        }
        .profile-pic img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ddd;
        }
        .edit-icon {
            position: absolute;
            right: 0;
            bottom: 0;
            background: #4a67ff;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid white;
        }
        .input-group {
            text-align: left;
            margin-top: 15px;
        }
        .input-group label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background: #f0f0ff;
            font-size: 14px;
            outline: none;
        }
        .update-btn {
            background: #4a67ff;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .update-btn:hover {
            background: #3549c1;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Back Button -->
        <div class="back-btn">
            <i class="fa fa-arrow-left"></i>
        </div>

        <!-- Profile Header -->
        <div class="profile-header">Profile</div>

        <!-- Profile Picture -->
        <div class="profile-pic">
            <img src="C:\users\hp\OneDrive\Pictures\Screenshots\Screenshot 2025-03-06 110855.png" alt="Profile Picture">
            <div class="edit-icon"><i class="fa fa-pencil"></i></div>
        </div>

        <!-- Form Fields -->
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" value="John Doe">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" value="+123 567 89000">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" value="johndoe@example.com">
        </div>

        <div class="input-group">
            <label>Date Of Birth</label>
            <input type="text" placeholder="DD / MM / YYYY">
        </div>

        <!-- Update Profile Button -->
        <button class="update-btn">Update Profile</button>
    </div>
    

</body>
</html>
