<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 380px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .back-btn {
            text-align: left;
            margin-bottom: 10px;
        }
        .back-btn i {
            font-size: 18px;
            cursor: pointer;
            color: #555;
        }
        .header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4a67ff;
        }
        .input-container {
            position: relative;
            display: flex;
            align-items: center;
            background: #f0f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .input-container input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            font-size: 16px;
            padding: 5px;
        }
        .input-container i {
            color: #555;
            cursor: pointer;
        }
        .forgot-password {
            text-align: right;
            font-size: 12px;
            margin-bottom: 15px;
            color: #4a67ff;
            cursor: pointer;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        .change-password-btn {
            background: #4a67ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .change-password-btn:hover {
            background: #3a55cc;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Back Button -->
        <div class="back-btn">
            <i class="fa fa-arrow-left"></i>
        </div>

        <!-- Header -->
        <div class="header">Password Manager</div>

        <!-- Current Password -->
        <label for="current-password" style="display:block; text-align:left; font-size:14px; font-weight:bold;">Current Password</label>
        <div class="input-container">
            <input type="password" id="current-password" placeholder="••••••••">
            <i class="fa fa-eye-slash" onclick="togglePassword('current-password', this)"></i>
        </div>
        <div class="forgot-password">Forgot Password?</div>

        <!-- New Password -->
        <label for="new-password" style="display:block; text-align:left; font-size:14px; font-weight:bold;">New Password</label>
        <div class="input-container">
            <input type="password" id="new-password" placeholder="••••••••">
            <i class="fa fa-eye-slash" onclick="togglePassword('new-password', this)"></i>
        </div>

        <!-- Confirm New Password -->
        <label for="confirm-password" style="display:block; text-align:left; font-size:14px; font-weight:bold;">Confirm New Password</label>
        <div class="input-container">
            <input type="password" id="confirm-password" placeholder="••••••••">
            <i class="fa fa-eye-slash" onclick="togglePassword('confirm-password', this)"></i>
        </div>

        <!-- Change Password Button -->
        <button class="change-password-btn">Change Password</button>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            let input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            }
        }
    </script>

</body>
</html>
