<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin: auto;
        }
        .back-btn {
            text-align: left;
            margin-bottom: 10px;
        }
        .back-btn i {
            font-size: 18px;
            cursor: pointer;
            color: #555;
        }
        .settings-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #4a67ff; /* Blue color for title */
        }
        .settings-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .settings-option:hover {
            background: #f8f8ff;
        }
        .settings-option i {
            color: #4a67ff; /* Blue color for icons */
            margin-right: 10px;
        }
        .settings-option .arrow {
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Back Button -->
        <div class="back-btn">
            <i class="fa fa-arrow-left"></i>
        </div>

        <!-- Settings Header (Now in Blue) -->
        <div class="settings-header">Settings</div>

        <!-- Settings Options (Without Underline) -->
        <div class="settings-option">
            <div>
                <i class="fa fa-lightbulb"></i> Notification Setting
            </div>
            <i class="fa fa-angle-right arrow"></i>
        </div>

        <div class="settings-option">
            <div>
                <i class="fa fa-key"></i> Password Manager
            </div>
            <i class="fa fa-angle-right arrow"></i>
        </div>

        <div class="settings-option">
            <div>
                <i class="fa fa-user"></i> Delete Account
            </div>
            <i class="fa fa-angle-right arrow"></i>
        </div>
    </div>

</body>
</html>
