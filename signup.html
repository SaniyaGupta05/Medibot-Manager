<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up & Log-In</title>
    <link rel="stylesheet" href="signup.css">
    <script defer src="signup.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header Tabs -->
        <div class="header">
            <span class="tab active" id="signup-tab" onclick="switchTab('signup')">SIGN UP</span>
            <span class="tab" id="login-tab" onclick="switchTab('login')">LOG IN</span>
        </div>

        <!-- Form Box -->
        <div class="form-container">
            <div class="form-content">
                <h2 id="form-title">Sign Up</h2>
                <input type="text" placeholder="Name" id="name-field" class="transparent-box">
                <input type="text" placeholder="Phone No" class="transparent-box">
                <div class="password-container">
                    <input type="password" id="password" placeholder="Password" class="transparent-box">
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
                <input type="text" placeholder="OTP" class="transparent-box">
                <button class="login-btn" id="form-btn">SIGN UP</button>
            </div>
        </div>
    </div>
</body>
</html>
